apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: PostgreSQL
    type: postgres
    url: db:5432
    user: user
    secureJsonData:
      password: password
    jsonData:
      database: analytics_db
      sslmode: disable
      postgresVersion: 15
      timescaledb: false
